<!DOCTYPE html>
<html>
    <head>
        <title>CARTA Bus Tracker</title>
        <meta charset='utf-8' />
        <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
        <script src="https://unpkg.com/maplibre-gl@^4.7.1/dist/maplibre-gl.js"></script>
        <link href="https://unpkg.com/maplibre-gl@^4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

        <!-- font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <style>
            * {
                font-family: "Inter", sans-serif;
                font-optical-sizing: auto;
                font-style: normal;
            }

            body {
                margin: 0;
                padding: 0;
            }

            .maplibregl-popup-content {
                white-space: pre-line;
            }

            #app {
                bottom: 0;
                left: 0;
                right: 0;
                position: absolute;
                top: 0;
            }
            #map {
                bottom: 30px;
                left: 0;
                right: 0;
                position: absolute;
                top: 56px;                
            }

            #footer {
                background: #004360;
                bottom: 0;
                height: 30px;
                position: absolute;
                width: 100%;
                z-index: 99;
            }

            #footer-text {
                color: lightgray;
                left: 10px;
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
            }

            #header {
                background-color: #00D3EB;
                display: block;
                height: 56px;
                position: relative;
                width: 100%;
                z-index: 99;
            }

            #header #text {
                /* font-size: 16px;
                font-weight: 400;
                letter-spacing: .32px; */


                left: 15px;
                position: absolute;
                color: whitesmoke;
                top: 50%;
                transform: translateY(-50%);
            }

            #pagename {
                display: inline-block;
                font-size: 26px;
                font-weight: bold;
            }

            #warning {
                display: inline-block;
                color: black;
                font-weight: bold;
                margin-left: 15px;
            }
            #warning-mobile-inner {
                left: 15px;
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
            }

            @media screen and (max-width: 800px) {
                #footer {
                    font-size: 12px;
                }

                #header #text {
                    left: 15px;
                }

                /* #warning {
                    display: none;
                }
                #warning-mobile {
                    background: #004360;
                    height: 30px;
                    left: 0;
                    padding-left: 10px;
                    position: absolute;
                    right: 0;
                    top: 56px;
                    width: 100%;
                } */
            }

            .marker {
                border: 2px solid #004360;
                /* background: #00A3BD; */
                border-radius: 26px;
                cursor: pointer;
                height: 26px;
                text-align: center;
                width: 26px;
            }
            .marker:hover {
                height: 32px;
                width: 32px;
            }
            .marker-inner {
                background: #00A3BD;
                border-radius: 25px;
                height: 25px;
                left: 50%;
                position: absolute;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 25px;
            }
            .marker-inner-text {
                left: 50%;
                position: absolute;
                transform: translate(-50%, -50%);
                top: 50%;
            }

            .bus-inner img {
                height: 15px;
                left: 50%;
                position: absolute;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 15px;
            }

            .route-tag {
                background: #075f69;
                border-radius: 5px;
                color: whitesmoke;
                display: inline-block;
                font-weight: bold;
                margin-right: 5px;
                margin-bottom: 5px;
                padding: 2px 5px;
                min-width: 12.5px;
                text-align: center;
            }
    </style>
        <script>
            window.app = {
                catalog: {
                    bike_stations: {
                        url: "https://gocarta.s3.us-east-2.amazonaws.com/public/data/bike_chattanooga_stations/v1/data.points.geojson",
                        layer_type: "symbol",
                        icon_image: "./assets/icons/bike_chattanooga_station.png",
                        min_zoom: 12
                    },
                    buses: {
                        url: "https://gocarta.s3.us-east-2.amazonaws.com/public/data/gtfsrt_vehicle_positions/v1/data.points.geojson",
                        layer_type: "marker",
                        display_fields: ["route_id", "headsign", "vehicle_id", "direction"],
                        label: "route_id",
                        uid: "vehicle_id",
                        get_popup_text: function (feat) {
                            const props = feat.properties;
                            return `Route:\n${props.route_id}\n\nHeadsign:\n${props.headsign}\n\nDirection:\n${props.direction}`;
                        }
                    },
                    bus_routes: {
                        url: "https://gocarta.s3.us-east-2.amazonaws.com/public/data/simple_bus_routes/v1/data.lines.geojson",
                        layer_type: "line",
                    },
                    bus_stops: {
                        url: "https://gocarta.s3.us-east-2.amazonaws.com/public/data/simple_bus_stops/v1/data.points.geojson",
                        layer_type: "circle",
                        min_zoom: 14,
                    },
                },
                config: {
                },
                data: {
                    routes: null,
                    stops: null,
                    buses: null,
                    stop_updates: null
                },
                render: {
                    route_tag: function (route_id) {
                        return `<div class="route-tag" data-route-id="${route_id}">${route_id}</div>`;
                    }
                },
                state: {
                    markers: {
                        buses: null
                    },
                    route: null
                }
            };
        </script>
    </head>
    <body>
        <div id="app">
            <div id="header">
                <div id="text">
                    <div id="pagename">CARTA Bus Tracker</div>
                </div>
            </div>
            <div id="map"></div>
            <div id="footer">
                <div id="footer-text">
                    Built by CARTA with MapLibreGL.
                </div>
            </div>
        </div>
        <script>
            window.app.state.route = new URLSearchParams(window.location.search).get("route");

            function get_xy_point(item) {
                if (typeof item.loc === "object" && item.loc.type === "Point" && typeof item.loc.coordinates === "object" && item.loc.coordinates.length === 2) {
                    return item.loc.coordinates;
                } else if (typeof item.latitude === "number" && typeof item.longitude === "number") {
                    return [item.longitude, item.latitude];
                } else if (typeof item.latitude === "string" && typeof item.longitude === "string") {
                    return [Number(item.longitude), Number(item.latitude)];                    
                } else if (typeof item.Latitude === "number" && typeof item.Longitude === "number") {
                    return [item.Longitude, item.Latitude];
                } else if (typeof item.lat === "number" && typeof item.lon === "number") {
                    return [item.lon, item.lat];
                } else if (typeof item.lat === "string" && typeof item.lon === "string") {
                    return [Number(item.lon), Number(item.lat)];                    
                } else {
                    console.log("failed to parse", item);
                }
            }
            
            var mapOptions = {
                container: 'map', // container id
                // Define the map syle (OpenStreetMap raster tiles)
                style: "https://api.maptiler.com/maps/streets-v2-light/style.json?key=8qWGv20RR0VkG9m95KLc",
                center: [-85.310947, 35.055666], // starting position [lng, lat]
                zoom: 10.75 // starting zoom
            };

            // zoom out more if on mobile
            if (window.innerWidth < 800) {
                mapOptions.zoom = 9;
                mapOptions.attributionControl = false;
            }

            var map = new maplibregl.Map(mapOptions);

            map.addControl(new maplibregl.GeolocateControl({
                positionOptions: {
                    enableHighAccuracy: true
                },
                trackUserLocation: true,
                showUserHeading: true
            }), "top-right");

            map.on('load', async () => {
                load_bus_routes();
                load_bus_stops();
                load_bike_stations();
                load_buses();
            });

            if (window.innerWidth < 800) {
                map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
            }

            async function update_layer (key) {
                try {
                    console.log("updating layer: " + key);
                    const layer = window.app.catalog[key];
                    const url = layer.url;
                    const layer_type = layer.layer_type;
                    const min_zoom = layer.min_zoom;
                    const icon_image = layer.icon_image;
                    const circle_color = layer.circle_color;
                    const circle_stroke_color = layer.circle_stroke_color;
                    const circle_radius = layer.circle_radius;
                    const display_fields = layer.display_fields;
                    const uid = layer.uid;
                    const label = layer.label;
                    const get_popup_text = layer.get_popup_text;
                    const res = await fetch(url);
                    const data = await res.json();

                    const updated_uids = [];
                    const matched_markers = [];

                    const new_markers = [];

                    const features = data.features;
                    for (let i = 0; i < features.length; i++) {
                        const feat = features[i];
                        const point = feat.geometry.coordinates;
                        const props = feat.properties;
                        const uid_value = props[uid];

                        // find it
                        const marker = app.state.markers[key].find(function (marker) {
                            return marker.getElement().getAttribute("data-uid") === (uid_value).toString();
                        });
                        if (marker) {
                            const lngLat = marker.getLngLat();
                            if (lngLat.lng !== point[0] || lngLat.lat !== point[1]) {
                                marker.setLngLat(point);
                            }

                            // update popup text
                            let popup_text;
                            if (get_popup_text) {
                                popup_text = get_popup_text(feat);
                            } else {
                                popup_text = display_fields.map(fld => `${fld}:\n${feat.properties[fld]}`).join("\n\n").trim();
                            }

                            // how can I update popup text
                            const popup = marker.getPopup();
                            if (popup._popup_text !== popup_text) {
                                popup.setText(popup_text);
                                popup._popup_text = popup_text;
                            };

                            matched_markers.push(marker);
                        } else {
                            const el = document.createElement('div');
                            el.className = "marker bus";
                            el.innerHTML = `<div class="marker-inner bus-inner"><div class="marker-inner-text">${feat.properties[label]}</div></div>`;

                            let popup_text;
                            if (get_popup_text) {
                                popup_text = get_popup_text(feat);
                            } else {
                                popup_text = display_fields.map(fld => `${fld}:\n${feat.properties[fld]}`).join("\n\n").trim();
                            }
                            const popup = new maplibregl.Popup({offset: 25});
                            popup._popup_text = popup_text;
                            popup.setText(popup_text);
                            const marker = new maplibregl.Marker( { element: el })
                                .setLngLat(point)
                                .setPopup(popup)
                                .addTo(map);
                            new_markers.push(marker);    
                        }
                    }
       
                    // delete any markers that weren't matched in the new dataset
                    app.state.markers[key].forEach(function (marker) {
                        if (!matched_markers.includes(marker)) {
                            marker.remove();
                        }
                    });

                    // update marker stats
                    app.state.markers[key] = matched_markers.concat(new_markers);
                } catch (error) {
                    console.error(error);
                }
            }

            async function load_layer (key) {
                console.log("loading layer: " + key);
                const layer = window.app.catalog[key];
                const url = layer.url;
                const layer_type = layer.layer_type;
                const min_zoom = layer.min_zoom;
                const icon_image = layer.icon_image;
                const circle_color = layer.circle_color;
                const circle_stroke_color = layer.circle_stroke_color;
                const circle_radius = layer.circle_radius;
                const display_fields = layer.display_fields;
                const uid = layer.uid;
                const label = layer.label;
                const res = await fetch(url);
                const data = await res.json();

                map.addSource(key, {
                    'type': 'geojson',
                    'data': data
                });


                if (layer_type === "marker") {
                    app.state.markers[key] = [];
                    const features = data.features;
                    for (let i = 0; i < features.length; i++) {
                        const feat = features[i];
                        const props = feat.properties;
                        if (feat.geometry.type !== "Point") continue;
                        const point = feat.geometry.coordinates;
                        if (!point) continue;

                        // create a DOM element for the marker
                        const el = document.createElement('div');
                        el.className = "marker bus";
                        el.innerHTML = `<div class="marker-inner bus-inner"><div class="marker-inner-text">${feat.properties[label]}</div></div>`;

                        el.setAttribute("data-uid", props[uid]);

                        const description = display_fields.map(fld => `${fld}:\n${feat.properties[fld]}`).join("\n\n");
                        const popup = new maplibregl.Popup({offset: 25}).setText(description.trim());
                        const marker = new maplibregl.Marker( { element: el })
                            .setLngLat(point)
                            .setPopup(popup)
                            .addTo(map);
                        app.state.markers[key].push(marker);    
                    }
                } else if (layer_type === "symbol") {
                    const image = await map.loadImage(icon_image);
                    map.addImage(icon_image, image.data);
                    const options = {
                        id: key,
                        type: layer_type,
                        source: key,
                        layout: {
                            'icon-image': icon_image,
                            'icon-size': 0.5,
                            'icon-allow-overlap': true
                        }
                    };
                    if (min_zoom) options.minzoom = min_zoom;
                    map.addLayer(options);                    
                } else if (layer_type === "circle") {      
                    const options = {
                        id: key,
                        type: 'circle',
                        source: key,
                        paint: {
                            'circle-radius': circle_radius || 5,
                            'circle-color': circle_color || '#AAA',
                            'circle-stroke-width': 2,
                            'circle-stroke-color': circle_stroke_color || '#777'
                        }
                    };
                    if (min_zoom) options.minzoom = min_zoom;
                    map.addLayer(options);
                } else if (layer_type === "line") {
                    map.addLayer({
                        'id': key,
                        'type': layer_type,
                        'source': key,
                        'layout': {
                            'line-join': 'round',
                            'line-cap': 'round'
                        },
                        'paint': {
                            // This expression tells MapLibre: 
                            // "Look at the 'stroke' property of the feature and use it as the color."
                            // If 'stroke' is missing, default to '#000' (black).
                            'line-color': ['get', 'stroke'], 
                            'line-width': 3,
                            'line-opacity': 0.6
                        }
                    });
                }
            }

            function load_data (key) {
                window.app.data[key] = new Promise(async function (resolve, reject) {
                    try {
                        const url = app.catalog[key].url;
                        const response = await fetch(url);
                        const data = await response.json();
                        resolve(data);
                    } catch (error) {
                        reject(error);
                    }
                });
            }

            console.log("calling load data bus route")
            load_data("bus_routes");

            (async function load_route_colors () {
                const bus_routes = await app.data.bus_routes;
                console.log("br:", bus_routes);
                const route_colors = {};
                for (let i = 0; i < bus_routes.features.length; i++) {
                    const props = bus_routes.features[i].properties;
                    route_colors[props.id] = props.color;
                }
                app.state.route_colors = route_colors;
                console.log("route colors:", app.state.route_colors);

                const css = Object.entries(route_colors)
                    .map(([routeId, color]) =>
                    `[data-route-id="${routeId}"] { background-color: ${color}; }`
                    )
                    .join('\n');

                // Create style element
                const style = document.createElement('style');
                style.type = 'text/css';
                style.id = 'route-color-styles';
                style.appendChild(document.createTextNode(css));

                // Inject into head
                document.head.appendChild(style);
            })();

            async function load_bus_routes () {
                console.log("loading bus routes");
                load_layer("bus_routes");            
            }

            async function load_bus_stops () {
                console.log("loading bus_stops");
                load_layer("bus_stops");            
            }

            async function load_bike_stations () {
                console.log("loading bike_stations");
                load_layer("bike_stations");                
            }

            async function load_buses () {
                console.log("loading buses");
                await load_layer("buses");
            }

            async function update_buses () {
                await update_layer("buses");
            }

            async function sync_trip_updates () {
                const response = await fetch("https://gocarta.s3.us-east-2.amazonaws.com/public/data/gtfsrt_trip_updates/v1/data.json");
                const data = await response.json();
                
                const trip_updates_by_stop_id = {}
                data.forEach(function (stop_time) {
                    const stop_id = stop_time["stop_id"];
                    const scheduled_arrival_time = stop_time["scheduled_arrival_time"];
                    const predicted_arrival_time = stop_time["predicted_arrival_time"];
                    if (!trip_updates_by_stop_id[stop_id]) trip_updates_by_stop_id[stop_id] = [];
                    trip_updates_by_stop_id[stop_id].push({
                        "stop_headsign": stop_time["stop_headsign"],
                        "sheduled_arrival_time": scheduled_arrival_time,
                        "predicted_arrival_time": predicted_arrival_time,
                        "vehicle_id": stop_time["vehicle_id"]
                    });
                });
                for (let stop_id in trip_updates_by_stop_id) {
                    const value = trip_updates_by_stop_id[stop_id];
                    value.sort(function (a, b) {
                        return new Date(a.predicted_arrival_time) - new Date(b.predicted_arrival_time);
                    });
                }
                app.data.stop_updates = trip_updates_by_stop_id;
            }

            function connect_stop_updates_to_stop_markers() {

            } 

            setInterval(function () {
                update_buses();
            }, 1 * 1000);

            // setInterval(function () {
            //     sync_trip_updates();
            // }, 5 * 1000);

            ["bike_stations", "bus_stops"].forEach(function (layer_name) {
                map.on('mouseenter', layer_name, () => {
                    map.getCanvas().style.cursor = 'pointer';
                });

                // Change it back to a pointer when it leaves.
                map.on('mouseleave', layer_name, () => {
                    map.getCanvas().style.cursor = '';
                });
            });

            map.on('click', (e) => {
                const features = map.queryRenderedFeatures(e.point, {
                    layers: ['bus_stops', 'bike_stations']
                });

                if (!features.length) return;

                // Only use the top-most feature (first one returned)
                const feature = features[0];
                const layerId = feature.layer.id;
                const coords = feature.geometry.coordinates.slice();
                const props = feature.properties;

                let description = '';

                if (layerId === 'bus_stops') {
                    description = `<strong>Stop ID:</strong><br>${props.id || 'Unknown'}<br/><br/><strong>Name:</strong><br>${props.name || 'Unnamed'}<br/><br/><strong>Routes:</strong><br>${props.route_ids.split(',').map(rid => app.render.route_tag(rid)).join("")}<br/><br/>`;
                }

                if (layerId === 'bike_stations') {
                    description = `
                        <strong>Station Name:</strong><br>${props.name || 'Unknown'}<br>
                        <strong>Bikes Available:</strong><br>${props.bikes_available}<br>
                        <strong>Docks Available:</strong><br>${props.docks_available}
                    `;
                }

                new maplibregl.Popup({ offset: 10 })
                    .setLngLat(coords)
                    .setHTML(description)
                    .addTo(map);
            });

        </script>
    </body>
</html>
